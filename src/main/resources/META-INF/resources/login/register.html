<!-- 네비바 아래 삽입한다. -->
<section class="hero d-flex align-items-center justify-content-center text-center py-5">
  <div class="container" style="max-width: 480px;">
    <h2 class="fw-bold mb-4">회원가입</h2>

    <form id="registerForm" action="/register_check" method="post">

      <!-- 아이디 -->
      <div class="mb-3 text-start">
        <label class="form-label">아이디 *</label>
        <input
          type="text"
          class="form-control"
          id="username"
          name="username"
          placeholder="4~20자 영문/숫자"
          required
        >
        <div class="invalid-feedback" id="usernameMsg"></div>
      </div>

      <!-- 패스워드 -->
      <div class="mb-3 text-start">
        <label class="form-label">패스워드 *</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="8자 이상, 영문+숫자+특수문자"
          required
        >
        <div class="invalid-feedback" id="passwordMsg"></div>
      </div>

      <!-- 패스워드 확인 -->
      <div class="mb-3 text-start">
        <label class="form-label">패스워드 확인 *</label>
        <input
          type="password"
          class="form-control"
          id="passwordConfirm"
          placeholder="패스워드 재입력"
          required
        >
        <div class="invalid-feedback" id="passwordMsg"></div>
      </div>

      <!-- 이메일 -->
      <div class="mb-3 text-start">
        <label class="form-label">이메일 *</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="example@email.com"
          required
        >
        <div class="invalid-feedback" id="emailMsg"></div>
      </div>

      <!-- 연락처 -->
      <div class="mb-3 text-start">
        <label class="form-label">연락처 *</label>
        <input
          type="text"
          class="form-control"
          id="phone"
          name="phone"
          placeholder="010-0000-0000"
          required
        >
        <div class="invalid-feedback" id="phoneMsg"></div>
      </div>

      <input type="hidden" id="hashedPassword" name="password">

      <button
        type="button"
        class="btn btn-primary w-100"
        onclick="validateAndShowModal()"
      >
        회원가입
      </button>

    </form>
  </div>
</section>

<!-- 가입 확인 모달 (</section> 아래, </body> 위) -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">가입 확인</h5>
        <button type="button" class="btn-close btn-close-white"
          data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>아래 정보로 가입하시겠습니까?</p>
        <table class="table table-dark table-bordered">
          <tr>
            <th>아이디</th>
            <td id="confirmUsername"></td>
          </tr>
          <tr>
            <th>이메일</th>
            <td id="confirmEmail"></td>
          </tr>
          <tr>
            <th>연락처</th>
            <td id="confirmPhone"></td>
          </tr>
          <tr>
            <th>패스워드</th>
            <td>******** (암호화 전송)</td>
          </tr>
        </table>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary"
          data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary"
          onclick="submitRegister()">가입하기</button>
      </div>
    </div>
  </div>
</div>
